<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Netlify Forms</title>
</head>
<body>
  <form name="free-meal-plan-quick" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="free-meal-plan-quick" />
    <input name="email" type="email" />
    <input name="source" />
    <input name="status" />
    <input name="bot-field" />
  </form>

  <form name="free-meal-plan-generator" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="free-meal-plan-generator" />
    <input name="name" />
    <input name="email" type="email" />
    <input name="goal" />
    <input name="diet" />
    <input name="source" />
    <input name="status" />
    <input name="bot-field" />
  </form>

  <form name="lead-strategy-script" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="lead-strategy-script" />
    <input name="name" />
    <input name="email" type="email" />
    <textarea name="audience"></textarea>
    <textarea name="result"></textarea>
    <textarea name="offer"></textarea>
    <textarea name="proof"></textarea>
    <textarea name="next_step"></textarea>
    <textarea name="generated_script"></textarea>
    <input name="source" />
    <input name="status" />
    <input name="bot-field" />
  </form>

  <form name="transformation-submission" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
    <input type="hidden" name="form-name" value="transformation-submission" />
    <input name="name" />
    <input name="email" type="email" />
    <input name="package" />
    <input name="timeframe" />
    <input name="result" />
    <textarea name="story"></textarea>
    <input name="instagram" />
    <input name="consent" />
    <input name="before_photo" type="file" />
    <input name="after_photo" type="file" />
    <input name="source" />
    <input name="status" />
    <input name="bot-field" />
  </form>

  <form name="client-acquisition-event" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="client-acquisition-event" />
    <input name="stage" />
    <input name="timestamp" />
    <input name="page" />
    <input name="name" />
    <input name="email" type="email" />
    <input name="package" />
    <input name="payment_mode" />
    <input name="value" />
    <input name="monthly_value" />
    <input name="goal" />
    <input name="mood" />
    <input name="energy" />
    <input name="wins" />
    <input name="blocks" />
    <input name="meals_total" />
    <textarea name="items"></textarea>
    <textarea name="custom_order"></textarea>
    <input name="monthly" />
    <input name="date" />
    <input name="time" />
    <input name="reward_mode" />
    <input name="monthly_savings" />
    <input name="discount_percent" />
    <input name="referral_code" />
    <input name="referral_link" />
    <input name="rating" />
    <textarea name="testimonial"></textarea>
    <input name="session_type" />
    <input name="platform" />
    <input name="frequency" />
    <input name="sessions_per_month" />
    <input name="medical_clearance_required" />
    <input name="health_screen_complete" />
    <input name="status" />
    <input name="source" />
    <input name="funnel_status" />
    <input name="bot-field" />
  </form>
</body>
</html>
